<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Website</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <script>
        (function(){
            emailjs.init('Ot-QeY1eknNLCEKD');
        })();
    </script>
    <script src="https://embed.tawk.to/Tickets@mack-and-sons/electronics.tawk.email"></script>
</head>
<body>
    <header>
        <h1>Welcome to Mack and Sons Enterprises</h1>
        <div id="cart">
            <button onclick="toggleCart()">Cart (0)</button>
            <div id="cart-items" style="display:none;">
                <!-- Cart items will be displayed here -->
                <p>Your cart is empty</p>
            </div>
        </div>
    </header>
    <main>
        <div id="product-list">
            <!-- Product cards will be generated here -->
            <div class="product-card">
                <h2>Product Title</h2>
                <p>Product Description</p>
                <p>Price: $49.99</p>
                <button onclick="addToCart('Product Title', 49.99)">Add to Cart</button>
            </div>
            <!-- And more product cards... -->
        </div>
    </main>
    <footer>
        <p>© 2026 Mack and Sons Enterprises</p>
    </footer>
    <script>
        let cart = [];

        function addToCart(item, price) {
            cart.push({item, price});
            updateCartDisplay();
        }

        function updateCartDisplay() {
            const cartItems = document.getElementById('cart-items');
            cartItems.innerHTML = '';
            let total = 0;
            cart.forEach(cartItem => {
                cartItems.innerHTML += `<p>${cartItem.item} - $${cartItem.price}</p>`;
                total += cartItem.price;
            });
            cartItems.innerHTML += `<p>Total: $${total}</p>`;
            document.querySelector('#cart button').innerText = `Cart (${cart.length})`;
            cartItems.style.display = cart.length > 0 ? 'block' : 'none';
        }

        function toggleCart() {
            const cartItems = document.getElementById('cart-items');
            cartItems.style.display = cartItems.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
